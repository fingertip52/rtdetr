task: detection

num_classes: 10
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ./dataset/visdrone_raw/VisDrone2019-DET-train/images
    ann_file: ./dataset/visdrone_coco/annotations/instances_train.json
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  batch_size: 4
  num_workers: 4
  drop_last: True

val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ./dataset/visdrone_raw/VisDrone2019-DET-val/images
    ann_file: ./dataset/visdrone_coco/annotations/instances_val.json
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  batch_size: 8
  num_workers: 4
  drop_last: False